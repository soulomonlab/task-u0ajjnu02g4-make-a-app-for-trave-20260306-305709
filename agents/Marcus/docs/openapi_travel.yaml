openapi: 3.0.2
info:
  title: Travel App API
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /discovery:
    get:
      summary: Home discovery curated lists
      parameters:
        - name: locale
          in: query
          schema:
            type: string
          description: locale e.g. en-US
        - name: country
          in: query
          schema:
            type: string
      responses:
        '200':
          description: discovery payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryResponse'
  /search:
    get:
      summary: Search places
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: tags
          in: query
          schema:
            type: string
            description: comma-separated tags
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
  /itineraries:
    post:
      summary: Create itinerary
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItineraryCreate'
      responses:
        '201':
          description: created itinerary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Itinerary'
    get:
      summary: List user's itineraries
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: list
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Itinerary'
  /itineraries/{id}:
    get:
      summary: Get itinerary
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: itinerary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Itinerary'
    put:
      summary: Update itinerary
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItineraryUpdate'
      responses:
        '200':
          description: updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Itinerary'
  /bookings:
    post:
      summary: Create booking (checkout)
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreate'
      responses:
        '201':
          description: booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
  /bookings/{id}:
    get:
      summary: Get booking
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: booking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Place:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        city:
          type: string
        country:
          type: string
        lat:
          type: number
        lon:
          type: number
        tags:
          type: array
          items:
            type: string
        rating:
          type: number
    DiscoveryResponse:
      type: object
      properties:
        featured:
          type: array
          items:
            $ref: '#/components/schemas/Place'
        promos:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
              image_url:
                type: string
    SearchResponse:
      type: object
      properties:
        total:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/Place'
    ItineraryCreate:
      type: object
      properties:
        title:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
      required: [title]
    ItineraryUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
    Itinerary:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        title:
          type: string
        description:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        items:
          type: array
          items:
            type: object
            properties:
              place:
                $ref: '#/components/schemas/Place'
              day_index:
                type: integer
    BookingCreate:
      type: object
      properties:
        itinerary_id:
          type: string
        provider:
          type: string
        amount_cents:
          type: integer
        currency:
          type: string
      required: [provider, amount_cents, currency]
    Booking:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        amount_cents:
          type: integer
        currency:
          type: string
